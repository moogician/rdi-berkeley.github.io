<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 170" width="720" height="170">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="720" height="170" fill="#ffffff" rx="10"/>

  <!-- Row 1 -->
  <!-- Stage 1: Ingestion — inbox/download icon -->
  <rect x="16" y="14" width="150" height="56" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="44" y="38" fill="#999" font-size="16">&#x1F4E5;</text>
  <text x="62" y="34" fill="#999" font-size="9" font-weight="600">STAGE 1</text>
  <text x="62" y="50" fill="#333" font-size="11" font-weight="500">Ingestion</text>

  <text x="176" y="44" text-anchor="middle" fill="#ccc" font-size="13">&#x2192;</text>

  <!-- Stage 2: Static Policy — shield icon -->
  <rect x="190" y="14" width="150" height="56" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="218" y="38" fill="#999" font-size="16">&#x1F6E1;</text>
  <text x="238" y="34" fill="#999" font-size="9" font-weight="600">STAGE 2</text>
  <text x="238" y="50" fill="#333" font-size="11" font-weight="500">Static Policy</text>

  <text x="350" y="44" text-anchor="middle" fill="#ccc" font-size="13">&#x2192;</text>

  <!-- Stage 3: Code Analysis — magnifying glass icon -->
  <rect x="364" y="14" width="150" height="56" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="392" y="38" fill="#999" font-size="16">&#x1F50D;</text>
  <text x="412" y="34" fill="#999" font-size="9" font-weight="600">STAGE 3</text>
  <text x="412" y="50" fill="#333" font-size="11" font-weight="500">Code Analysis</text>

  <text x="524" y="44" text-anchor="middle" fill="#ccc" font-size="13">&#x2192;</text>

  <!-- Stage 4: LLM Analysis — brain icon -->
  <rect x="538" y="14" width="150" height="56" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="566" y="38" fill="#999" font-size="16">&#x1F9E0;</text>
  <text x="586" y="34" fill="#999" font-size="9" font-weight="600">STAGE 4</text>
  <text x="586" y="50" fill="#333" font-size="11" font-weight="500">LLM Analysis</text>

  <!-- Wrap arrow -->
  <path d="M695,42 Q710,42 710,85 Q710,128 695,128" stroke="#ccc" stroke-width="1" fill="none"/>

  <!-- Row 2 (right to left) -->
  <!-- Stage 5: z3 Verification — checkmark icon -->
  <rect x="538" y="100" width="150" height="56" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="566" y="124" fill="#999" font-size="16">&#x2705;</text>
  <text x="586" y="120" fill="#999" font-size="9" font-weight="600">STAGE 5</text>
  <text x="586" y="136" fill="#333" font-size="11" font-weight="500">z3 Verification</text>

  <text x="524" y="130" text-anchor="middle" fill="#ccc" font-size="13">&#x2190;</text>

  <!-- Stage 6: Runtime Verify — gear icon -->
  <rect x="364" y="100" width="150" height="56" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="392" y="124" fill="#999" font-size="16">&#x2699;</text>
  <text x="412" y="120" fill="#999" font-size="9" font-weight="600">STAGE 6</text>
  <text x="412" y="136" fill="#333" font-size="11" font-weight="500">Runtime Verify</text>

  <text x="350" y="130" text-anchor="middle" fill="#ccc" font-size="13">&#x2190;</text>

  <!-- Stage 7: Adversarial Test — lightning icon -->
  <rect x="190" y="100" width="150" height="56" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="218" y="124" fill="#999" font-size="16">&#x26A1;</text>
  <text x="238" y="120" fill="#999" font-size="9" font-weight="600">STAGE 7</text>
  <text x="238" y="136" fill="#333" font-size="11" font-weight="500">Adversarial Test</text>

  <text x="176" y="130" text-anchor="middle" fill="#ccc" font-size="13">&#x2190;</text>

  <!-- Stage 8: Correlation — chart icon -->
  <rect x="16" y="100" width="150" height="56" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="44" y="124" fill="#999" font-size="16">&#x1F4CA;</text>
  <text x="62" y="120" fill="#999" font-size="9" font-weight="600">STAGE 8</text>
  <text x="62" y="136" fill="#333" font-size="11" font-weight="500">Correlation</text>
</svg>